<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="/css/dashboard.css">
    <title>Dashboard</title>
</head>
<body>

                </div>
                <ul>
                    <li><a href="#"><img class = "icon"src = "/images/svg-hackaton/objects-column 1.svg" alt="Dashboard" width = "30px" height = "30px"> <span id = "home">DashBoard</span></a></li>
                    <li><a href="#"><img class = "icon"src = "/images/svg-hackaton/signal-stream 1.svg" alt="GestorTareas" width = "30px" height = "30px"> <span id = "tareas">Tareas</span></a></li>
